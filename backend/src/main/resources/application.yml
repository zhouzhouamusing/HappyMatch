server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
      timeout: 30m

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/happy_match?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
